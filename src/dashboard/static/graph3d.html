<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>UnaBetting — Knowledge Graph 3D</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #02020A; overflow: hidden; }
    #graph { position: absolute; inset: 0; }
    #graph canvas { display: block; }
    #hud {
      position: fixed; top: 12px; left: 14px; z-index: 10; color: #9fb4ff;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; pointer-events: none;
      text-shadow: 0 0 8px rgba(120, 150, 255, 0.8);
    }
    #hud b { color: #fff; }
    #search {
      position: fixed; top: 10px; right: 14px; z-index: 10;
      background: rgba(10, 12, 30, 0.85); border: 1px solid #39406e; color: #cdd6ff;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 6px 10px; width: 220px;
    }
  </style>
</head>
<body>
  <div id="hud">UNABETTING ─ KNOWLEDGE GRAPH<br><span id="hud-info">caricamento…</span></div>
  <input id="search" placeholder="⌕ cerca un nodo…">
  <div id="graph"></div>
  <!-- three before 3d-force-graph because graph3d.js uses THREE for star sprites -->
  <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
  <script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>
  <script src="/static/safe_html.js"></script>
  <script src="/static/graph3d.js"></script>
</body>
</html>
