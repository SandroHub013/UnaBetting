name: Release (cross-platform desktop builds)

# Triggered when a maintainer pushes a version tag (e.g. v0.1.0) for a release that
# ALREADY has the runtime bundle attached. The maintainer flow:
#   1. bump VERSION, retrain if needed
#   2. python scripts/build_release_bundle.py
#   3. gh release create vX.Y.Z dist/UnaBetting-runtime-vX.Y.Z.zip --notes "..."
#   4. git tag vX.Y.Z && git push origin vX.Y.Z   (triggers this workflow)
#
# Each OS job downloads that runtime bundle, bakes it into a PyInstaller build, and
# uploads the platform installer back to the same release. You cannot cross-build a
# macOS .app or a Linux binary from Windows — hence the matrix, one runner per OS.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write   # upload assets to the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: UnaBetting-windows
          - os: macos-latest
            artifact: UnaBetting-macos
          - os: ubuntu-latest
            artifact: UnaBetting-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Resolve tag
        id: tag
        shell: bash
        run: echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}" >> "$GITHUB_OUTPUT"

      - name: Install app + PyInstaller (no torch in the binary)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download runtime bundle from the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "UnaBetting-runtime-*.zip" --dir dist
          python -c "import zipfile,glob,os; z=glob.glob('dist/UnaBetting-runtime-*.zip')[0]; \
            os.makedirs('dist/bundle_stage',exist_ok=True); \
            zipfile.ZipFile(z).extractall('dist/bundle_stage'); print('staged', z)"

      - name: Build with PyInstaller
        run: pyinstaller packaging/unabetting.spec --noconfirm

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/UnaBetting/* -DestinationPath "dist/${{ matrix.artifact }}-${{ steps.tag.outputs.tag }}.zip" -Force

      - name: Package artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist && zip -ry "${{ matrix.artifact }}-${{ steps.tag.outputs.tag }}.zip" UnaBetting.app

      - name: Package artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist && tar -czf "${{ matrix.artifact }}-${{ steps.tag.outputs.tag }}.tar.gz" UnaBetting

      - name: Upload installer to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            dist/${{ matrix.artifact }}-${{ steps.tag.outputs.tag }}.* --clobber
