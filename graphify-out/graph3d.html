<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Interactive Graph</title>
  <style>
    body { margin: 0; padding: 0; background-color: #0f0f1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
    #3d-graph { width: 100vw; height: 100vh; }
    #info { position: absolute; top: 15px; left: 15px; background: rgba(26, 26, 46, 0.85); padding: 15px; border-radius: 8px; border: 1px solid #2a2a4e; max-width: 350px; pointer-events: none; backdrop-filter: blur(4px); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    #info h3 { margin: 0 0 10px 0; font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #3a3a5e; padding-bottom: 5px; }
    #node-info { font-size: 13px; line-height: 1.5; color: #ccc; }
    #node-info strong { color: #fff; font-size: 15px; display: block; margin-bottom: 5px; word-break: break-all; }
    #controls { position: absolute; top: 15px; right: 15px; background: rgba(26, 26, 46, 0.85); padding: 15px; border-radius: 8px; border: 1px solid #2a2a4e; backdrop-filter: blur(4px); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    #controls h4 { margin: 0 0 10px 0; font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #3a3a5e; padding-bottom: 5px; }
    #controls p { margin: 5px 0; font-size: 12px; color: #ccc; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; color: #fff; pointer-events: none; }
  </style>
  <!-- Load 3D Force Graph library -->
  <script src="https://unpkg.com/3d-force-graph"></script>
</head>
<body>
  <div id="loading" class="loading">Loading Graph Data...</div>
  <div id="3d-graph"></div>
  <div id="info">
    <h3>Node Info</h3>
    <div id="node-info">Hover over a node to see details.</div>
  </div>
  <div id="controls">
    <h4>Controls</h4>
    <p>🖱️ <b>Left-click + drag:</b> Rotate</p>
    <p>🖱️ <b>Right-click + drag:</b> Pan</p>
    <p>📜 <b>Scroll:</b> Zoom</p>
    <p>🎯 <b>Click node:</b> Focus</p>
  </div>
  <script>
    // Distinct vibrant color palette for communities
    const colors = [
      '#4E79A7', '#F28E2B', '#E15759', '#76B7B2', '#59A14F',
      '#EDC948', '#B07AA1', '#FF9DA7', '#9C755F', '#BAB0AC',
      '#8dd3c7', '#ffffb3', '#bebada', '#fb8072', '#80b1d3',
      '#fdb462', '#b3de69', '#fccde5', '#d9d9d9', '#bc80bd'
    ];

    fetch('graph.json')
      .then(res => {
        if (!res.ok) throw new Error("Network response was not ok");
        return res.json();
      })
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        
        // Count degrees to size nodes
        const degreeCounts = {};
        data.links.forEach(link => {
            degreeCounts[link.source] = (degreeCounts[link.source] || 0) + 1;
            degreeCounts[link.target] = (degreeCounts[link.target] || 0) + 1;
        });

        const gData = {
          nodes: data.nodes.map(n => ({
            ...n,
            val: Math.min(Math.max((degreeCounts[n.id] || 1) * 0.5, 1), 15)
          })),
          links: data.links
        };

        const Graph = ForceGraph3D()
          (document.getElementById('3d-graph'))
            .graphData(gData)
            .nodeLabel('label')
            .nodeColor(node => {
              if (node.community !== undefined) {
                return colors[node.community % colors.length];
              }
              return '#ffffff';
            })
            .nodeVal('val')
            .nodeOpacity(0.9)
            .linkColor(() => 'rgba(255, 255, 255, 0.15)')
            .linkWidth(0.5)
            .linkDirectionalParticles(link => link.weight ? 2 : 0) // Add moving particles to links with weights
            .linkDirectionalParticleWidth(1.2)
            .linkDirectionalParticleSpeed(0.005)
            .onNodeHover(node => {
              const infoDiv = document.getElementById('node-info');
              if (node) {
                document.body.style.cursor = 'pointer';
                infoDiv.innerHTML = `
                  <strong>${node.label || node.id}</strong>
                  <div style="margin-top:8px"><b>Type:</b> ${node.file_type || 'N/A'}</div>
                  <div><b>File:</b> ${node.source_file || 'N/A'}</div>
                  <div><b>Community:</b> ${node.community !== undefined ? node.community : 'N/A'}</div>
                  <div><b>Connections:</b> ${degreeCounts[node.id] || 0}</div>
                `;
              } else {
                document.body.style.cursor = 'default';
                infoDiv.innerHTML = 'Hover over a node to see details.';
              }
            })
            .onNodeClick(node => {
              // Aim at node from outside it
              const distance = 40;
              const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);

              Graph.cameraPosition(
                { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }, // new position
                node, // lookAt ({ x, y, z })
                3000  // ms transition duration
              );
            });
            
            // Initial camera position
            Graph.cameraPosition({ z: 600 });
            
            // Add a slow rotation to make it feel alive
            let angle = 0;
            setInterval(() => {
              Graph.cameraPosition({
                x: 600 * Math.sin(angle),
                z: 600 * Math.cos(angle)
              });
              angle += Math.PI / 1500;
            }, 50);

      }).catch(err => {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('node-info').innerHTML = `
            <span style="color:#ff6b6b">
              <b>Error loading graph.json.</b><br/><br/>
              If you opened this file directly via <i>file://</i>, your browser blocked it due to CORS.<br/><br/>
              Please run a local server:<br/>
              <code>python -m http.server</code><br/>
              Then go to <i>http://localhost:8000/graph3d.html</i>
            </span>
          `;
          console.error("Error loading graph.json:", err);
      });
  </script>
</body>
</html>
